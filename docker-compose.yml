services:

  engine:
    build: ./engine
    environment:
      - ENGINE_PORT=9001
    restart: unless-stopped

  planner:
    build:
      context: .
      dockerfile: planner/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENGINE_HOST=engine
      - ENGINE_PORT=9001
      - FRONTEND_DIR=/app/static
    depends_on:
      - engine
    restart: unless-stopped
